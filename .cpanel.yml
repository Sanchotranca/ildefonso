# Despliegue automático en cPanel
# Activar en cPanel → Git Version Control → Pull or Deploy.
# IMPORTANTE: sustituir CHANGEME-USUARIO por el username real de cPanel
# antes del primer deploy.
---
deployment:
  tasks:
    - export DEPLOYPATH=/home/CHANGEME-USUARIO/public_html/

    # Sincronizar páginas y assets al directorio público
    - /bin/cp -R ./*.html        $DEPLOYPATH
    - /bin/cp -R ./css           $DEPLOYPATH
    - /bin/cp -R ./js            $DEPLOYPATH
    - /bin/cp -R ./img           $DEPLOYPATH

    # Archivos raíz obligatorios
    - /bin/cp ./.htaccess        $DEPLOYPATH
    - /bin/cp ./robots.txt       $DEPLOYPATH
    - /bin/cp ./sitemap.xml      $DEPLOYPATH

    # Permisos correctos (estándar ELIAWEB v4: 755 carpetas, 644 archivos)
    - find $DEPLOYPATH -type d -exec chmod 755 {} \;
    - find $DEPLOYPATH -type f -exec chmod 644 {} \;
    - find $DEPLOYPATH -name '.htaccess' -exec chmod 644 {} \;

    # Nota: NO copiamos README.md, DEPLOY.md, scripts/, fonts/ vacía,
    # ni img/PHOTOS.md — son documentación interna que no debe servirse.
