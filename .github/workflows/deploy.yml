name: Deploy to production

# Despliegue automático vía FTP/SFTP a hosting tradicional.
# ACTIVAR cuando se quiera desplegar desde GitHub en lugar de cPanel Git.
#
# Secrets requeridos en Settings → Secrets and variables → Actions:
#   FTP_SERVER     ej. ftp.residenciasanildefonso.es
#   FTP_USERNAME   usuario cPanel
#   FTP_PASSWORD   contraseña cPanel
#   FTP_SERVER_DIR ruta absoluta, ej. /public_html/

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          # Excluir documentación interna y archivos de desarrollo
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/scripts/**
            **/README.md
            **/DEPLOY.md
            **/.cursorrules
            **/.cpanel.yml
            **/img/PHOTOS.md
            **/fonts/.gitkeep
            **/php/.gitkeep
